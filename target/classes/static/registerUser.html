<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bli medlem</title>
    <link rel="stylesheet" href="login.css">
    <script src="register.js" defer></script>
</head>
<body class="fade fade-out">

<div class="login-box">
    <img src="fairplayleague.png" class="logo" alt="">
    <h2>Bli medlem</h2>

    <input id="username" type="text" placeholder="Användarnamn">
    <input id="email" type="text" placeholder="Email">

    <div class="password-wrapper">
        <input type="password" id="password" placeholder="Lösenord">
        <img src="fairplayleague.png" id="togglePassword" class="toggle-icon">
    </div>

    <button id="registerBtn" style="background:#22c55e;color:white;">Skapa konto</button>

    <p id="result"></p>
</div>

</body>
</html>
